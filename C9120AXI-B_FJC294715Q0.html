<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column}
header{background:#1A2332;padding:14px 24px;display:flex;align-items:center;justify-content:center}
header img{max-height:48px;max-width:180px;object-fit:contain}
header .cn{color:#fff;font-size:20px;font-weight:600}
.bar{height:4px;background:#C8201E}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 16px}
  .card{background:#fff;border-radius:14px;max-width:460px;width:100%;overflow:hidden;box-shadow:0 4px 28px rgba(0,0,0,.10)}
  .ch{background:#1A2332;padding:20px 24px;border-bottom:3px solid #C8201E}
  .ch .lbl{font-size:10px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
  .ch .mdl{font-size:24px;font-weight:700;color:#fff;line-height:1.2}
  .ch .sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px}
  .cb{padding:6px 0}
  .row{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid #f2f2f2;text-decoration:none;color:inherit;transition:background .12s}
  .row:last-child{border-bottom:none}
  .row:hover{background:#f8f9fa}
  .ic{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
  .ic-blue{background:#e8edf5}  .ic-green{background:#eaf2ea}  .ic-orange{background:#fdf0e8}  .ic-purple{background:#f0eafa}  .ic-teal{background:#e6f4f1}
  .rl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  .rv{font-size:14px;font-weight:500;color:#1a2332}  .rv a{color:#C8201E;text-decoration:none}  .rv a:hover{text-decoration:underline}
footer{text-align:center;padding:14px;font-size:11px;color:#bbb}
</style></head><body>
